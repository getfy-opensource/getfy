services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${GETFY_HTTP_PORT:-80}:80"
      - "${GETFY_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - getfy_env:/etc/getfy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    command:
      [
        "sh",
        "-lc",
        "touch /etc/getfy/Caddyfile.domains; (last=\"\"; while true; do cur=\"$$(sha256sum /etc/getfy/Caddyfile.domains 2>/dev/null | awk '{print $$1}')\"; if [ \"$$cur\" != \"$$last\" ]; then last=\"$$cur\"; caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile 2>/dev/null || true; fi; sleep 2; done) & caddy run --config /etc/caddy/Caddyfile --adapter caddyfile",
      ]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: getfy_app:latest
    restart: unless-stopped
    volumes:
      - getfy_storage:/var/www/html/storage
      - getfy_env:/var/www/html/.docker
    environment:
      APP_ENV: ${GETFY_APP_ENV:-local}
      APP_DEBUG: ${GETFY_APP_DEBUG:-true}
      GETFY_APP_URL: ${GETFY_APP_URL:-http://localhost}
      PORT: "80"
      APP_INSTALLED: ${GETFY_APP_INSTALLED:-true}
      APP_AUTO_MIGRATE: ${GETFY_APP_AUTO_MIGRATE:-false}
      DB_CONNECTION: ${GETFY_DB_CONNECTION:-mysql}
      DB_HOST: ${GETFY_DB_HOST:-mysql}
      DB_PORT: ${GETFY_DB_PORT:-3306}
      DB_DATABASE: ${GETFY_DB_DATABASE:-getfy}
      DB_USERNAME: ${GETFY_DB_USERNAME:-getfy}
      DB_PASSWORD: ${GETFY_DB_PASSWORD:-getfy}
      REDIS_HOST: ${GETFY_REDIS_HOST:-redis}
      REDIS_PORT: ${GETFY_REDIS_PORT:-6379}
      CACHE_STORE: ${GETFY_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${GETFY_QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${GETFY_SESSION_DRIVER:-file}
      GETFY_DOCKER: "true"
      GETFY_RUN_SETUP: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${GETFY_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${GETFY_MYSQL_DATABASE:-${GETFY_DB_DATABASE:-getfy}}
      MYSQL_USER: ${GETFY_MYSQL_USER:-${GETFY_DB_USERNAME:-getfy}}
      MYSQL_PASSWORD: ${GETFY_MYSQL_PASSWORD:-${GETFY_DB_PASSWORD:-getfy}}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  queue:
    image: getfy_app:latest
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=0"]
    volumes:
      - getfy_storage:/var/www/html/storage
      - getfy_env:/var/www/html/.docker
    environment:
      APP_ENV: ${GETFY_APP_ENV:-local}
      APP_DEBUG: ${GETFY_APP_DEBUG:-true}
      GETFY_APP_URL: ${GETFY_APP_URL:-http://localhost}
      APP_INSTALLED: ${GETFY_APP_INSTALLED:-true}
      APP_AUTO_MIGRATE: ${GETFY_APP_AUTO_MIGRATE:-false}
      DB_CONNECTION: ${GETFY_DB_CONNECTION:-mysql}
      DB_HOST: ${GETFY_DB_HOST:-mysql}
      DB_PORT: ${GETFY_DB_PORT:-3306}
      DB_DATABASE: ${GETFY_DB_DATABASE:-getfy}
      DB_USERNAME: ${GETFY_DB_USERNAME:-getfy}
      DB_PASSWORD: ${GETFY_DB_PASSWORD:-getfy}
      REDIS_HOST: ${GETFY_REDIS_HOST:-redis}
      REDIS_PORT: ${GETFY_REDIS_PORT:-6379}
      CACHE_STORE: ${GETFY_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${GETFY_QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${GETFY_SESSION_DRIVER:-file}
      GETFY_DOCKER: "true"
      GETFY_RUN_SETUP: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: getfy_app:latest
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - getfy_storage:/var/www/html/storage
      - getfy_env:/var/www/html/.docker
    environment:
      APP_ENV: ${GETFY_APP_ENV:-local}
      APP_DEBUG: ${GETFY_APP_DEBUG:-true}
      GETFY_APP_URL: ${GETFY_APP_URL:-http://localhost}
      APP_INSTALLED: ${GETFY_APP_INSTALLED:-true}
      APP_AUTO_MIGRATE: ${GETFY_APP_AUTO_MIGRATE:-false}
      DB_CONNECTION: ${GETFY_DB_CONNECTION:-mysql}
      DB_HOST: ${GETFY_DB_HOST:-mysql}
      DB_PORT: ${GETFY_DB_PORT:-3306}
      DB_DATABASE: ${GETFY_DB_DATABASE:-getfy}
      DB_USERNAME: ${GETFY_DB_USERNAME:-getfy}
      DB_PASSWORD: ${GETFY_DB_PASSWORD:-getfy}
      REDIS_HOST: ${GETFY_REDIS_HOST:-redis}
      REDIS_PORT: ${GETFY_REDIS_PORT:-6379}
      CACHE_STORE: ${GETFY_CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${GETFY_QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${GETFY_SESSION_DRIVER:-file}
      GETFY_DOCKER: "true"
      GETFY_RUN_SETUP: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
  getfy_storage:
    driver: local
  getfy_env:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
